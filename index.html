<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORAL TASK II - Water Sports Assessment</title>
    <style>
        :root {
            --oxford-blue: #002147;
            --oxford-gold: #F39200;
            --soft-bg: #f4f7f9;
            --success: #10b981;
            --drive-blue: #4285F4;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--soft-bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container { max-width: 800px; width: 100%; }
        .card {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 8px solid var(--oxford-blue);
        }
        .header-logo {
            font-weight: bold;
            color: var(--oxford-blue);
            font-size: 1.6rem;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .student-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .full-width { grid-column: span 2; }
        input {
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
        }
        .task-instructions {
            background: #fffcf0;
            border: 1px solid var(--oxford-gold);
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            margin-bottom: 20px;
        }
        .task-instructions h3 { margin-top: 0; color: var(--oxford-blue); }
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin: 20px 0;
            background: #fff;
            padding: 10px;
            border-radius: 10px;
        }
        .image-gallery img {
            width: 100%;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        .timer-box {
            font-size: 3rem;
            font-weight: bold;
            color: var(--oxford-blue);
            margin: 15px 0;
        }
        .timer-warning { color: var(--danger); }
        .recording-status {
            color: var(--danger);
            font-weight: bold;
            display: none;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .recording .recording-status { display: block; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        button {
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            transition: 0.3s;
        }
        .btn-start { background: var(--oxford-blue); color: white; }
        .btn-finish { background: var(--success); color: white; display: none; }
        .btn-disabled { background: #cbd5e1; color: #64748b; cursor: not-allowed; }
        .btn-drive { background: var(--drive-blue); color: white; }
        .btn-retry { background: var(--danger); color: white; }

        #reportArea { display: none; }
        #finalSuccessMessage { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="setupUI">
        <div class="header-logo">ORAL TASK II: WATER SPORTS</div>
        
        <div class="student-inputs">
            <input type="text" id="firstName" placeholder="First Name">
            <input type="text" id="lastName" placeholder="Last Name">
            <input type="text" id="sClass" class="full-width" placeholder="Class (e.g. 5th A)">
        </div>

        <div class="task-instructions">
            <h3>📝 Instructions:</h3>
            <p>1. Look at the pictures and identify the activities.</p>
            <p>2. Say which sport you <strong>like</strong> and why.</p>
            <p>3. Say which sport you <strong>don't like</strong> and why not.</p>
            <p><em>Requirement: Give full answers. Talk for 1:30 to 2:00 minutes.</em></p>
        </div>

        <div class="image-gallery">
            <img src="https://i.ibb.co/Vp8p3zq/water-sports-task.jpg" alt="Water Sports">
        </div>

        <div class="recording-status" id="recStatus">● Recording...</div>
        <div class="timer-box" id="timerDisplay">00:00</div>
        
        <button id="startBtn" class="btn-start" onclick="startRecording()">🎤 Start Recording</button>
        <button id="finishBtn" class="btn-finish"
